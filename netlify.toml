[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# React Router uses client-side routing — without this, refreshing or
# deep-linking to a route like /trainings/123 returns a 404 from Netlify's
# static host instead of letting the SPA handle it.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
